<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mạng Xã Hội - Bio Link Professional</title>
    <style>
        :root { --bg: #050505; --glass: rgba(255,255,255,0.1); --text: #fff; --accent: #00f2ff; --btn-bg: #151515; }
        [data-theme="light"] { --bg: #f8f9fa; --glass: rgba(0,0,0,0.1); --text: #000; --accent: #ff007a; --btn-bg: #ffffff; }
        body { margin: 0; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background-color: var(--bg); color: var(--text); min-height: 100vh; display: flex; justify-content: center; align-items: center; transition: 0.5s; overflow-x: hidden; }
        #bg-container { position: fixed; inset: 0; z-index: -1; background-size: cover; background-position: center; transition: opacity 1.5s ease-in-out; }
        #bg-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.6); z-index: -1; }
        #welcome-modal { position: fixed; inset: 0; background: rgba(0,0,0,0.95); backdrop-filter: blur(25px); display: flex; justify-content: center; align-items: center; z-index: 9999; }
        .neon-text { font-size: 1.6rem; color: #fff; text-shadow: 0 0 10px #fff, 0 0 20px var(--accent); margin-bottom: 25px; text-align: center; }
        .neon-border { position: relative; background: #111; border-radius: 20px; overflow: hidden; padding: 2px; margin-bottom: 15px; }
        .neon-border::before { content: ""; position: absolute; top: -50%; left: -50%; width: 200%; height: 200%; background: conic-gradient(from 0deg, #ff007a, #00f2ff, #70ff00, #ff007a); animation: rotate 3s linear infinite; }
        @keyframes rotate { 100% { transform: rotate(360deg); } }
        .glass-btn { position: relative; z-index: 1; display: flex; width: 100%; height: 50px; justify-content: center; align-items: center; border-radius: 18px; border: none; background: var(--btn-bg); color: var(--text); font-weight: 700; cursor: pointer; transition: 0.2s; box-shadow: 0 6px 0px #0002; text-decoration: none; }
        .glass-btn:active { transform: translateY(4px); box-shadow: 0 2px 0px #0002; }
        .glass-container { background: var(--glass); backdrop-filter: blur(30px) saturate(180%); border: 1px solid rgba(255,255,255,0.1); border-radius: 40px; padding: 30px; width: 90%; max-width: 400px; text-align: center; box-shadow: 0 20px 50px rgba(0,0,0,0.5); }
        .nav-menu { display: flex; justify-content: space-around; margin-bottom: 25px; border-bottom: 1px solid #777; padding-bottom: 15px; }
        .nav-btn { cursor: pointer; font-weight: bold; opacity: 0.7; }
        .section { display: none; } .active { display: block; }
        .social-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-top: 20px; }
        #music-player { width: 100%; margin-top: 20px; display: none; border-radius: 15px; }
    </style>
</head>
<body>
    <div id="bg-container"></div>
    <div id="bg-overlay"></div>

    <script>
        function changeBg() {
            const bgEl = document.getElementById('bg-container');
            bgEl.style.opacity = 0;
            setTimeout(() => {
                bgEl.style.backgroundImage = `url(https://picsum.photos/1920/1080?random=${new Date().getTime()})`;
                bgEl.style.opacity = 1;
            }, 800);
        }
        changeBg(); setInterval(changeBg, 15000);
    </script>

    <div id="welcome-modal">
        <div>
            <h1 class="neon-text">Chào mừng đến Website của mình</h1>
            <button class="glass-btn" style="background:var(--accent); color:#000;" onclick="this.parentElement.parentElement.style.display='none'">OK</button>
        </div>
    </div>

    <div class="glass-container">
        <div class="nav-menu">
            <span class="nav-btn" onclick="showSection('home')">Mạng Xã Hội</span>
            <span class="nav-btn" onclick="showSection('music')">Âm Nhạc</span>
            <span class="nav-btn" onclick="showSection('settings')">Cài đặt</span>
        </div>

        <div id="home" class="section active">
            <h1>Mạng Xã Hội</h1>
            <div class="social-grid">
                <div class="neon-border"><a href="https://www.facebook.com/share/18BKDM9Ukt/" class="glass-btn" target="_blank">Facebook</a></div>
                <div class="neon-border"><a href="https://www.tiktok.com/@nquoctrung._08" class="glass-btn" target="_blank">TikTok</a></div>
                <div class="neon-border"><a href="https://www.instagram.com/nqtun._.08/" class="glass-btn" target="_blank">Instagram</a></div>
                <div class="neon-border"><a href="https://zalo.me/0817108290" class="glass-btn" target="_blank">Zalo</a></div>
                <div class="neon-border" style="grid-column: span 2;"><a href="https://t.me/dzchimdai" class="glass-btn" target="_blank">Telegram</a></div>
            </div>
        </div>

        <div id="music" class="section">
            <div class="neon-border"><button class="glass-btn" id="music-toggle-btn" onclick="toggleMusic()">Bật Nhạc</button></div>
            <div style="margin-top:15px;">
                <div class="neon-border"><button class="glass-btn" onclick="playSong('https://archive.org/embed/sao-em-vo-tinh')">🎵 Sao em vô tình</button></div>
                <div class="neon-border"><button class="glass-btn" onclick="playSong('https://archive.org/embed/say-you-do-remix')">🎵 Say You Do</button></div>
                <div class="neon-border"><button class="glass-btn" onclick="playSong('https://archive.org/embed/muon-ruou-to-tinh-remix')">🎵 Mượn rượu tỏ tình</button></div>
                <div class="neon-border"><button class="glass-btn" onclick="playSong('https://archive.org/embed/yeu-mot-nguoi-co-le-dj')">🎵 Yêu một người có lẽ</button></div>
            </div>
            <iframe id="music-player" src="" height="60" style="width:100%; border:none; display:none; border-radius:15px;" allow="autoplay"></iframe>
        </div>

        <div id="settings" class="section">
            <button class="glass-btn" onclick="toggleTheme()">Chuyển Sáng/Tối</button>
        </div>
    </div>

    <script>
        function showSection(id) { document.querySelectorAll('.section').forEach(s => s.classList.remove('active')); document.getElementById(id).classList.add('active'); }
        function playSong(url) { const p = document.getElementById('music-player'); p.src = url + '&autoplay=1'; p.style.display = 'block'; document.getElementById('music-toggle-btn').innerText = "Tắt Nhạc"; }
        function toggleMusic() { const p = document.getElementById('music-player'); if(p.style.display === 'block') { p.style.display = 'none'; p.src = ""; document.getElementById('music-toggle-btn').innerText = "Bật Nhạc"; } else { playSong('https://archive.org/embed/sao-em-vo-tinh'); } }
        function toggleTheme() { const d = document.documentElement; d.setAttribute('data-theme', d.getAttribute('data-theme') === 'dark' ? 'light' : 'dark'); }
    </script>
</body>
</html>
